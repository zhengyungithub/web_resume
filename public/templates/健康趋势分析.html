        .avatar-dropdown-item i {

</head>

<script>
    // 头像点击事件处理
    document.addEventListener('DOMContentLoaded', function() {
        const avatarBtn = document.getElementById('avatarBtn');
        const avatarDropdown = document.getElementById('avatarDropdown');

        // 点击头像显示/隐藏下拉菜单
        avatarBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            avatarDropdown.classList.toggle('active');
        });

        // 点击页面其他位置隐藏下拉菜单
        document.addEventListener('click', function() {
            avatarDropdown.classList.remove('active');
        });

        // 阻止下拉菜单内部的点击事件冒泡
        avatarDropdown.addEventListener('click', function(e) {
            e.stopPropagation();
        });
    });

    function logout() {
        if (confirm('确定要退出登录吗？')) {
            // 清除本地存储的 token 和 userId
            localStorage.removeItem('token');
            localStorage.removeItem('userId');
            // 跳转到登录页面
            window.location.href = "/";
        }
    }

    function showProfile() {
        // 跳转到个人信息页面
        window.location.href = "/个人信息";
    }

    // 初始化图表
    const chartDom = document.getElementById('healthChart');
    const myChart = echarts.init(chartDom);
    const bmiChart = echarts.init(document.getElementById('bmiChart'));
    const bloodPressureChart = echarts.init(document.getElementById('bloodPressureChart'));
    let currentChartType = 'line';
    const bmiOption = {
        animation: false,
        tooltip: {
            trigger: 'axis'
        },
        xAxis: {
            type: 'category',
            data: ['1月', '2月', '3月', '4月', '5月', '6月']
        },
        yAxis: {
            type: 'value',
            name: 'BMI'
        },
        series: [{
            data: [21.5, 22.1, 22.3, 22.4, 22.5, 22.5],
            type: 'line',
            smooth: true,
            itemStyle: {
                color: '#6B8E51'
            }
        }]
    };

    const bloodPressureOption = {
        animation: false,
        tooltip: {
            trigger: 'axis'
        },
        legend: {
            data: ['收缩压', '舒张压']
        },
        xAxis: {
            type: 'category',
            data: ['1月', '2月', '3月', '4月', '5月', '6月']
        },
        yAxis: {
            type: 'value',
            name: 'mmHg'
        },
        series: [{
            name: '收缩压',
            data: [142, 143, 145, 144, 145, 145],
            type: 'line',
            smooth: true,
            itemStyle: {
                color: '#FF9D42'
            }
        },
            {
                name: '舒张压',
                data: [88, 89, 90, 89, 90, 90],
                type: 'line',
                smooth: true,
                itemStyle: {
                    color: '#6B8E51'
                }
            }]
    };

    bmiChart.setOption(bmiOption);
    bloodPressureChart.setOption(bloodPressureOption);

    window.addEventListener('resize', function () {
        bmiChart.resize();
        bloodPressureChart.resize();
    });

    // 获取当前登录用户的userId (模拟数据)
    const currentUserId = localStorage.getItem('userId') || '1';
    // 不需要登录验证，直接使用模拟数据

    // 页面加载时获取数据
    document.addEventListener('DOMContentLoaded', () => {
        // 设置默认日期范围（最近7天）
        const endDate = new Date();
        const startDate = new Date();
        startDate.setDate(endDate.getDate() - 7);

        document.getElementById('startDate').value = formatDate(startDate);
        document.getElementById('endDate').value = formatDate(endDate);

        // 加载默认数据
        loadData('7d');
    });

    // 日期格式化辅助函数
    function formatDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    // 加载趋势数据
    function loadData(range) {
        updateActiveButton(range);
        showChartLoading();

        // 模拟数据
        const mockData = getMockData(range);
        
        setTimeout(() => {
            updateChart(mockData);
            hideChartLoading();
        }, 500);
    }

    // 更新活动按钮样式
    function updateActiveButton(selectedRange) {
        document.querySelectorAll('.time-range-btn').forEach(btn => {
            btn.classList.remove('bg-primary/10', 'text-primary');
            btn.classList.add('bg-gray-100', 'text-gray-600');
        });

        const activeBtn = document.querySelector(`button[onclick="loadData('${selectedRange}')"]`);
        if (activeBtn) {
            activeBtn.classList.remove('bg-gray-100', 'text-gray-600');
            activeBtn.classList.add('bg-primary/10', 'text-primary');
        }
    }

    // 加载自定义日期范围数据
    function loadCustomDate() {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;

        if (!startDate || !endDate) {
            alert('请选择开始和结束日期');
            return;
        }

        showChartLoading();
        
        // 模拟数据
        const mockData = getMockData('custom', startDate, endDate);
        
        setTimeout(() => {
            updateChart(mockData);
            hideChartLoading();
        }, 500);
    }
    
    // 切换图表类型
    function changeChartType(type) {
        currentChartType = type;
        // 重新加载当前数据
        const activeBtn = document.querySelector('.time-range-btn.bg-primary\/10');
        if (activeBtn) {
            const range = activeBtn.getAttribute('onclick').match(/loadData\('(\w+)'\)/)[1];
            loadData(range);
        } else {
            // 如果没有激活的时间范围按钮，尝试加载自定义日期
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            if (startDate && endDate) {
                loadCustomDate();
            }
        }
    }
    
    // 导出数据
    function exportData() {
        // 生成CSV格式数据
        const csvContent = generateCSVData();
        
        // 创建下载链接
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        
        if (link.download !== undefined) {
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `健康趋势数据_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    }
    
    // 生成CSV数据
    function generateCSVData() {
        // 模拟数据，实际应用中应该从图表数据中获取
        const headers = ['日期', '收缩压', '舒张压', '血糖', '心率', 'BMI'];
        const rows = [
            ['2024-01-01', '120', '80', '5.6', '75', '22.5'],
            ['2024-01-02', '122', '81', '5.7', '76', '22.5'],
            ['2024-01-03', '121', '80', '5.5', '74', '22.4'],
            ['2024-01-04', '123', '82', '5.8', '77', '22.6'],
            ['2024-01-05', '120', '79', '5.6', '75', '22.5']
        ];
        
        const csvContent = [
            headers.join(','),
            ...rows.map(row => row.join(','))
        ].join('\n');
        
        return csvContent;
    }

    // 更新图表
    function updateChart(data) {
        if (!data.dates || data.dates.length === 0) {
            showNoDataMessage();
            return;
        }

        // 获取当前选择的图表类型
        const chartType = document.getElementById('chartType').value;

        // 更新主图表
        const option = {
            tooltip: {
                trigger: 'axis',
                formatter: function (params) {
                    let result = params[0].axisValue + '<br/>';
                    params.forEach(param => {
                        result += `
                    <span style="display:inline-block;margin-right:5px;border-radius:10px;width:10px;height:10px;background-color:${param.color}"></span>
                    ${param.seriesName}: ${param.value} ${getUnit(param.seriesName)}<br/>
                    `;
                    });
                    return result;
                }
            },
            legend: {
                data: ['收缩压', '舒张压', '血糖', '心率'],
                bottom: 0
            },
            grid: {
                left: '3%',
                right: '4%',
                bottom: '10%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                boundaryGap: chartType === 'bar',
                data: data.dates,
                axisLabel: { rotate: 45 }
            },
            yAxis: { type: 'value' },
            series: [
                {
                    name: '收缩压',
                    type: chartType,
                    smooth: chartType === 'line',
                    data: data.systolicPressures || [],
                    itemStyle: { color: '#60A5FA' },
                    lineStyle: chartType === 'line' ? { width: 2, color: '#60A5FA' } : undefined,
                    symbolSize: 8
                },
                {
                    name: '舒张压',
                    type: chartType,
                    smooth: chartType === 'line',
                    data: data.diastolicPressures || [],
                    itemStyle: { color: '#34D399' },
                    lineStyle: chartType === 'line' ? { width: 2, color: '#34D399' } : undefined,
                    symbolSize: 8
                },
                {
                    name: '血糖',
                    type: chartType,
                    smooth: chartType === 'line',
                    data: data.bloodSugars || [],

    function showEmptyChart() {
        updateChart({
            dates: [],
            systolicPressures: [],

            bloodSugars: [],

        });

    // 生成模拟数据
    function getMockData(range, startDate, endDate) {
        let dates = [];
        let systolicPressures = [];
        let diastolicPressures = [];
        let bloodSugars = [];
        let heartRates = [];
        let bmis = [];
        
        // 生成日期数据
        let days = 7;
        if (range === '30d') days = 30;
        else if (range === '90d') days = 90;
        
        const today = new Date();
        
        for (let i = days - 1; i >= 0; i--) {
            const date = new Date(today);
            date.setDate(date.getDate() - i);
            const dateStr = `${date.getMonth() + 1}/${date.getDate()}`;
            dates.push(dateStr);
            
            // 生成随机数据
            systolicPressures.push(Math.round(120 + Math.random() * 20));
            diastolicPressures.push(Math.round(80 + Math.random() * 10));
            bloodSugars.push((5.0 + Math.random() * 1.5).toFixed(1));
            heartRates.push(Math.round(65 + Math.random() * 15));
            bmis.push((22 + Math.random() * 2).toFixed(1));
        }
        
        return {
            dates: dates,
            systolicPressures: systolicPressures,
            diastolicPressures: diastolicPressures,
            bloodSugars: bloodSugars,
            heartRates: heartRates,
            bmis: bmis
        };
    }

    // 辅助函数
    function getUnit(metric) {
        switch (metric) {
            case '收缩压':
            case '舒张压':
                return 'mmHg';
            case '血糖':
                return 'mmol/L';
            case '心率':
                return '次/分';
            default:
                return '';
        }
    }

    // 图表类型切换
    function changeChartType(type) {
        // 重新加载当前数据并更新图表类型
        const activeBtn = document.querySelector('.time-range-btn.bg-primary\/10');
        if (activeBtn) {
            const range = activeBtn.getAttribute('onclick').match(/loadData\('(.*)'\)/)[1];
            loadData(range);
        } else {
            // 如果没有激活的时间范围按钮，使用自定义日期
            loadCustomDate();
        }
    }

    // 导出数据
    function exportData() {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        
        // 生成模拟数据
        const mockData = getMockData('custom', startDate, endDate);
        
        // 准备CSV内容
        let csvContent = "日期,收缩压(mmHg),舒张压(mmHg),血糖(mmol/L),心率(次/分),BMI\n";
        
        for (let i = 0; i < mockData.dates.length; i++) {
            csvContent += `${mockData.dates[i]},${mockData.systolicPressures[i]},${mockData.diastolicPressures[i]},${mockData.bloodSugars[i]},${mockData.heartRates[i]},${mockData.bmis[i]}\n`;
        }
        
        // 创建下载链接
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.setAttribute('href', url);
        link.setAttribute('download', `健康趋势数据_${startDate}_${endDate}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

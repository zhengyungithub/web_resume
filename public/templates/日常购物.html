<div id="toast" class="fixed top-4 right-4 z-50 transform translate-x-full transition-transform duration-300"></div>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        // 定义 showToast 函数
        function showToast(message, success = true) {
            const toast = document.getElementById('toast');
            const toastMessage = document.createElement('div');
            toastMessage.classList.add('bg-white', 'p-4', 'rounded-lg', 'drop-shadow-md', 'flex', 'items-center', 'justify-between');
            if (success) {
                toastMessage.classList.add('bg-green-100', 'text-green-800');
            } else {
                toastMessage.classList.add('bg-red-100', 'text-red-800');
            }
            toastMessage.innerHTML = `
                <span>${message}</span>
                <button class="text-gray-400 hover:text-gray-600">
                    <i class="ri-close-line text-xl"></i>
                </button>
            `;
            toast.innerHTML = '';
            toast.appendChild(toastMessage);
            toast.classList.add('translate-x-0');
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                setTimeout(() => {
                    toast.innerHTML = '';
                }, 300);
            }, 3000);
        }

        // 从localStorage获取用户信息和token
        const userId = localStorage.getItem('userId') || 'mock_user';
        const token = localStorage.getItem('token') || 'mock_token';

        // 设置AJAX全局请求头
        $.ajaxSetup({
            headers: {
                'Authorization': 'Bearer ' + token
            }
        });

        // 在页面加载时获取所有商品的库存数据并更新前端显示
        $.ajax({
            url: '/日常购物/allProducts',
            type: 'GET',
            success: function (products) {
                products.forEach(function (product) {
                    const stockElement = $(`.stock-count[data-product-id="${product.id}"]`);
                    stockElement.text(product.stock);
                });
            },
            error: function (xhr) {
                if (xhr.status === 401) {
                    // 未授权，跳转到登录页面
                    window.location.href = '/login';
                } else {
                    showToast('获取库存数据失败', false);
                }
            }
        });

        // 处理加入购物车按钮点击事件
        $('.add-to-cart').on('click', function () {
            const productId = $(this).data('product-id');

            // 先获取最新库存数据
            $.ajax({
                url: `/日常购物/${productId}`,
                type: 'GET',
                success: function (product) {
                    const stockElement = $(`.stock-count[data-product-id="${product.id}"]`);
                    const currentStock = product.stock;

                    if (currentStock <= 0) {
                        showToast('该商品已售罄', false);
                        return;
                    }

                    // 构造购物车数据
                    const shoppingCartData = {
                        userId: userId,
                        productId: product.id,  // 直接发送产品ID
                        quantity: 1
                    };

                    // 发送AJAX请求添加到购物车
                    $.ajax({
                        url: '/日常购物/addToCart',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify(shoppingCartData),
                        success: function (response) {
                            if (response) {
                                // 更新前端库存显示
                                stockElement.text(currentStock - 1);
                                showToast('已添加到购物车');

                                // 更新购物车面板显示
                                fetchCartItems();
                            } else {
                                showToast('添加到购物车失败', false);
                            }
                        },
                        error: function (xhr) {
                            if (xhr.status === 401) {
                                window.location.href = '/login';
                            } else {
                                showToast('网络错误，请重试', false);
                            }
                        }
                    });
                },
                error: function (xhr) {
                    if (xhr.status === 401) {
                        window.location.href = '/login';
                    } else {
                        showToast('获取商品信息失败', false);
                    }
                }
            });
        });

        // 从后端获取购物车内容并更新前端显示
        function fetchCartItems() {
            $.ajax({
                url: `/日常购物/getCartByUserId/${userId}`,
                type: 'GET',
                success: function (cartItems) {
                    const cartItemsContainer = document.getElementById('cartItems');
                    cartItemsContainer.innerHTML = '';
                    let totalItems = 0;
                    let totalPrice = 0;

                    cartItems.forEach(function (cartItem) {
                        if (cartItem.product) {
                            const itemHtml = `
                                <div class="flex items-center space-x-4">
                                    <img src="${cartItem.product.image_url}" class="w-20 h-20 object-cover rounded" alt="${cartItem.product.name}">
                                    <div class="flex-1">
                                        <h4 class="font-medium">${cartItem.product.name}</h4>
                                        <div class="flex items-center justify-between mt-2">
                                            <span class="text-primary font-medium">¥${cartItem.product.price}</span>
                                            <div class="flex items-center space-x-2">
                                                <button class="w-6 h-6 rounded-full border border-gray-200 flex items-center justify-center minus-button" data-cart-item-id="${cartItem.id}">-</button>
                                                <span class="w-8 text-center cart-item-quantity">${cartItem.quantity}</span>
                                                <button class="w-6 h-6 rounded-full border border-gray-200 flex items-center justify-center plus-button" data-cart-item-id="${cartItem.id}">+</button>
                                            </div>
                                            <button class="delete-cart-item text-red-500 hover:text-red-700 ml-2" data-cart-item-id="${cartItem.id}"><i class="ri-delete-bin-line"></i></button>
                                        </div>
                                    </div>
                                </div>
                            `;
                            cartItemsContainer.innerHTML += itemHtml;
                            totalItems += cartItem.quantity;
                            totalPrice += cartItem.product.price * cartItem.quantity;
                        }
                    });

                    // 更新购物车总数显示
                    $('#cartBtn span').text(totalItems);

                    // 更新购物车面板底部信息
                    $('.cart-item-total').text(totalItems);
                    $('.cart-total-price').text(`¥${totalPrice.toFixed(2)}`);
                },
                error: function (xhr) {
                    if (xhr.status === 401) {
                        window.location.href = '/login';
                    } else {
                        showToast('获取购物车内容失败', false);
                    }
                }
            });
        }

        // 更新购物车中商品数量
        function updateCartQuantity(cartItemId, newQuantity) {
            const shoppingCartData = {
                id: cartItemId,
                quantity: newQuantity
            };
            $.ajax({
                url: '/日常购物/updateCartQuantity',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(shoppingCartData),
                success: function (response) {
                    if (!response) {
                        showToast('更新购物车数量失败', false);
                    }
                },
                error: function () {
                    showToast('网络错误，请重试', false);
                }
            });
        }

        // 从购物车中删除商品
        function deleteCartItem(cartItemId) {
            $.ajax({
                url: `/日常购物/deleteFromCart/${cartItemId}`,
                type: 'DELETE',
                success: function (response) {
                    if (!response) {
                        showToast('删除购物车商品失败', false);
                    } else {
                        showToast('已从购物车删除', true);
                    }
                },
                error: function () {
                    showToast('网络错误，请重试', false);
                }
            });
        }

        // 更新购物车总价
        function updateTotalPrice() {
            const itemPrices = document.querySelectorAll('.text-primary.font-medium');
            const itemQuantities = document.querySelectorAll('.cart-item-quantity');
            let total = 0;
            itemPrices.forEach(function (priceElement, index) {
                const price = parseFloat(priceElement.textContent.replace('¥', ''));
                const quantity = parseInt(itemQuantities[index].textContent);
                total += price * quantity;
            });
            document.getElementById('cartTotalPrice').textContent = `¥${total}`;
        }

        const dropdownToggles = document.querySelectorAll('.dropdown-toggle');

        dropdownToggles.forEach((toggle) => {
            const dropdown = toggle.closest('.dropdown');
            const dropdownContent = dropdown.querySelector('.dropdown-content');

            toggle.addEventListener('click', function (e) {
                e.preventDefault();
                dropdownContent.style.display = dropdownContent.style.display === 'block'? 'none' : 'block';
            });

            document.addEventListener('click', function (e) {
                if (!dropdown.contains(e.target)) {
                    dropdownContent.style.display = 'none';
                }
            });
        });
        
        // 商品分类筛选功能
        const categoryItems = document.querySelectorAll('.category-item');
        categoryItems.forEach(item => {
            item.addEventListener('click', function() {
                // 移除所有分类的active状态
                categoryItems.forEach(cat => cat.classList.remove('active'));
                // 添加当前分类的active状态
                this.classList.add('active');
                
                // 获取分类名称
                const categoryName = this.querySelector('span').textContent;
                
                // 筛选商品
                filterProductsByCategory(categoryName);
                
                showToast(`已切换到${categoryName}分类`);
            });
        });
        
        // 商品排序功能
        const sortButtons = document.querySelectorAll('.px-1.py-1 button');
        sortButtons.forEach(button => {
            button.addEventListener('click', function() {
                // 更新按钮状态
                sortButtons.forEach(btn => {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-primary');
                    btn.classList.add('text-gray-600');
                });
                this.classList.add('bg-white', 'shadow-sm', 'text-primary');
                this.classList.remove('text-gray-600');
                
                // 获取排序方式
                const sortType = this.textContent;
                
                // 排序商品
                sortProducts(sortType);
                
                showToast(`已按${sortType}排序`);
            });
        });
        
        // 价格区间筛选功能
        const priceFilterBtn = document.querySelector('.flex.items-center.space-x-2.text-sm.text-gray-600');
        if (priceFilterBtn) {
            const minPriceInput = priceFilterBtn.querySelector('input[type="number"]:first-child');
            const maxPriceInput = priceFilterBtn.querySelector('input[type="number"]:last-child');
            
            // 添加筛选按钮
            const filterButton = document.createElement('button');
            filterButton.textContent = '筛选';
            filterButton.className = 'px-4 py-1 bg-primary text-white rounded hover:bg-primary/90 transition-colors';
            filterButton.addEventListener('click', function() {
                const minPrice = parseFloat(minPriceInput.value) || 0;
                const maxPrice = parseFloat(maxPriceInput.value) || Infinity;
                
                filterProductsByPrice(minPrice, maxPrice);
                showToast(`已筛选价格区间：¥${minPrice} - ¥${maxPrice === Infinity ? '不限' : maxPrice}`);
            });
            
            priceFilterBtn.appendChild(filterButton);
        }
        
        // 按分类筛选商品
        function filterProductsByCategory(category) {
            const products = document.querySelectorAll('#productList > div');
            products.forEach(product => {
                const productName = product.querySelector('h3').textContent;
                // 这里可以根据实际需求修改筛选逻辑
                // 目前只是模拟筛选效果
                product.style.display = 'block';
            });
        }
        
        // 按价格筛选商品
        function filterProductsByPrice(minPrice, maxPrice) {
            const products = document.querySelectorAll('#productList > div');
            products.forEach(product => {
                const priceText = product.querySelector('.text-xl.font-bold.text-primary').textContent;
                const price = parseFloat(priceText.replace('¥', ''));
                
                if (price >= minPrice && price <= maxPrice) {
                    product.style.display = 'block';
                } else {
                    product.style.display = 'none';
                }
            });
        }
        
        // 商品排序功能
        function sortProducts(sortType) {
            const productList = document.getElementById('productList');
            const products = Array.from(productList.children);
            
            products.sort((a, b) => {
                if (sortType === '综合排序') {
                    // 综合排序：按销量和价格综合考虑
                    return 0;
                } else if (sortType === '销量优先') {
                    // 销量优先：这里模拟销量排序
                    return Math.random() - 0.5;
                } else if (sortType === '价格优先') {
                    // 价格优先：按价格从低到高排序
                    const priceA = parseFloat(a.querySelector('.text-xl.font-bold.text-primary').textContent.replace('¥', ''));
                    const priceB = parseFloat(b.querySelector('.text-xl.font-bold.text-primary').textContent.replace('¥', ''));
                    return priceA - priceB;
                }
                return 0;
            });
            
            // 重新排列商品
            products.forEach(product => productList.appendChild(product));
        }
    });
</script>

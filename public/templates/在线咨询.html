<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线咨询 - 乐龄生活</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#7AA968',
                        secondary: '#F4A460',
                        error: '#ef4444'
                    },
                    borderRadius: {
                        'none': '0px',
                        'sm': '4px',
                        DEFAULT: '8px',
                        'md': '12px',
                        'lg': '16px',
                        'xl': '20px',
                        '2xl': '24px',
                        '3xl': '32px',
                        'full': '9999px',
                        'button': '8px'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            min-height: 1024px;
            background-color: #F8F9FA;
        }

        .error-message {
            color: #f5222d;
            font-size: 14px;
            margin-top: 4px;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .nav-item {
            position: relative;
            cursor: pointer;
        }

        .nav-item.active {
            color: #6B8E51;
            font-weight: 500;
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #6B8E51;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .menu-item:hover {
            background-color: rgba(107, 142, 81, 0.1);
        }

        .menu-item.active {
            background-color: rgba(107, 142, 81, 0.1);
            color: #6B8E51;
            font-weight: 500;
        }

        /* 咨询卡片样式 */
        .consultation-card {
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .consultation-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .consultation-card.unread {
            border-left-color: #6B8E51;
            background-color: rgba(107, 142, 81, 0.05);
        }

        /* 主要按钮样式 */
        .bg-primary {
            background-color: #6B8E51;
        }

        .text-primary {
            color: #6B8E51;
        }

        .border-primary {
            border-color: #6B8E51;
        }

        /* 按钮基础样式 */
        .rounded-button {
            border-radius: 8px;
            transition: all 0.3s;
        }

        /* 悬停效果 */
        .bg-primary:hover {
            background-color: #5a7c4a;
        }

        .border-primary:hover {
            background-color: #6B8E51;
            color: white;
        }

        /* 头像下拉菜单样式 */
        .avatar-dropdown {
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 8px;
            width: 160px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 100;
            display: none;
        }

        .avatar-dropdown.show {
            display: block;
        }

        .avatar-dropdown-item {
            padding: 8px 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .avatar-dropdown-item:hover {
            background-color: #f5f5f5;
        }

        .avatar-dropdown-item i {
            margin-right: 8px;
            width: 20px;
            text-align: center;
        }

        /* 医生卡片样式 */
        .doctor-card {
            display: flex;
            align-items: center;
            padding: 16px;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .doctor-card:hover {
            border-color: #6B8E51;
        }

        .doctor-card.selected {
            border-color: #6B8E51;
            background-color: rgba(107, 142, 81, 0.05);
        }

        .doctor-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #f0f0f0;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6B8E51;
            font-size: 24px;
        }

        .doctor-info {
            flex: 1;
        }

        .doctor-name {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .doctor-specialty {
            color: #666;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .doctor-rating {
            display: flex;
            align-items: center;
            font-size: 14px;
        }

        .star-filled {
            color: #FFC107;
        }

        .star-empty {
            color: #E0E0E0;
        }

        /* 咨询表单样式 */
        .consultation-form {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .question-input {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: vertical;
        }

        .question-input:focus {
            outline: none;
            border-color: #6B8E51;
        }

        /* 咨询历史记录样式 */
        .consultation-history {
            margin-top: 24px;
        }

        .consultation-item {
            padding: 16px;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .consultation-date {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .consultation-question {
            margin-bottom: 8px;
        }

        .consultation-answer {
            padding: 12px;
            background-color: #f9f9f9;
            border-radius: 4px;
            font-size: 14px;
        }

        /* 标签样式 */
        .status-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-pending {
            background-color: #FFF7E6;
            color: #FA8C16;
        }

        .status-completed {
            background-color: #E6F7E0;
            color: #52C41A;
        }

        /* 内容区域切换样式 */
        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* 我的医生卡片样式 */
        .my-doctor-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            transition: all 0.3s;
        }

        .my-doctor-card:hover {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .my-doctor-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #f0f0f0;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6B8E51;
            font-size: 24px;
        }

        .my-doctor-info {
            flex: 1;
        }

        .my-doctor-actions {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-outline {
            border: 1px solid #6B8E51;
            color: #6B8E51;
            background: transparent;
        }

        .btn-outline:hover {
            background: #6B8E51;
            color: white;
        }

        .btn-primary-sm {
            background: #6B8E51;
            color: white;
            border: none;
        }

        .btn-primary-sm:hover {
            background: #5a7c4a;
        }
    </style>
</head>

<body>

                <!-- 头像下拉菜单 -->

<div class="w-[1440px] mx-auto pt-16">
    <main class="flex min-h-[calc(100vh-64px)]">
        <aside class="w-64 bg-white border-r p-4">
            <div class="text-lg font-medium mb-4">医生咨询</div>
            <div class="space-y-1">
                <a href="#" class="menu-item active" data-section="new-consultation" onclick="switchSection('new-consultation', this)">

                    <span>新咨询</span>

                <a href="#" class="menu-item" data-section="consultation-history" onclick="switchSection('consultation-history', this)">
                    <i class="fas fa-history mr-3 text-gray-400"></i>
                    <span>咨询记录</span>
                </a>
                <a href="#" class="menu-item" data-section="my-doctors" onclick="switchSection('my-doctors', this)">
                    <i class="fas fa-user-md mr-3 text-gray-400"></i>

                                <option value="心血管内科">心血管内科</option>
                                <option value="内分泌科">内分泌科</option>

                            </select>

<script>
    // 封装 API 调用的函数
    const apiClient = {
        baseUrl: '/api/consultations',
        token: localStorage.getItem('token') || 'mock_token',
        maxRetries: 3,

        async getAvailableDoctors() {
            return this.retryFetch(`${this.baseUrl}/doctors`);
        },

        async getRecentConsultations() {
            return this.retryFetch(`${this.baseUrl}/recent`);
        },

        async submitConsultation(doctorId, question) {
            return this.retryFetch(`${this.baseUrl}/submit`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${this.token}`
                },
                body: JSON.stringify({
                    doctor_id: doctorId,
                    question: question
                })
            });
        },

        async retryFetch(url, options = {}, retries = 0) {
            if (!this.token) {
                throw new Error('用户未认证，请重新登录');
            }

            options.headers = {
                ...options.headers,
                'Authorization': `Bearer ${this.token}`,
                'Accept': 'application/json'
            };

            try {
                const response = await fetch(url, options);

                if (!response.ok) {
                    let errorData;
                    try {
                        errorData = await response.json();
                    } catch {
                        errorData = { message: await response.text() };
                    }
                    throw new Error(errorData.message || `请求失败: ${response.status}`);
                }

                return await response.json();
            } catch (error) {
                if (retries < this.maxRetries) {
                    console.log(`请求失败，正在进行第 ${retries + 1} 次重试...`);
                    return this.retryFetch(url, options, retries + 1);
                }
                console.error('达到最大重试次数，请求失败:', error);
                showError(`请求失败: ${error.message}`);
                throw error;
            }
        }
    };

    function showError(message) {
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');

        if (errorAlert && errorMessage) {
            errorMessage.textContent = message;
            errorAlert.classList.remove('hidden');
            setTimeout(() => errorAlert.classList.add('hidden'), 5000);
        } else {
            alert(message);
        }
    }

    function showSuccess(message) {
        const successNotification = document.createElement('div');
        successNotification.className = 'fixed bottom-4 right-4 bg-green-500 text-white px-4 py-3 rounded-lg shadow-lg z-50 flex items-center';
        successNotification.innerHTML = `
            <i class="ri-check-circle-line mr-2 text-xl"></i>
            <span>${message}</span>
        `;
        document.body.appendChild(successNotification);
        
        setTimeout(() => {
            successNotification.style.opacity = '0';
            setTimeout(() => successNotification.remove(), 300);
        }, 3000);
    }

    function formatDateTime(dateString) {
        if (!dateString) return '--';
        const date = new Date(dateString);
        if (isNaN(date.getTime())) return dateString;
        
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        
        return `${year}-${month}-${day} ${hours}:${minutes}`;
    }

    function setButtonLoading(button, isLoading) {
        if (isLoading) {
            button.innerHTML = '<span class="loading-spinner"></span> ' + button.textContent.trim();
            button.disabled = true;
        } else {
            const icon = button.id.includes('submit') ? 'fa-paper-plane' : '';
            button.innerHTML = icon ? `<i class="fas ${icon} mr-2"></i>${button.textContent.trim()}` : button.textContent;
            button.disabled = false;
        }
    }

    function showProfile() {
        window.location.href = '/profile';
    }

    function logout() {
        if (confirm('确定要退出登录吗？')) {
            localStorage.removeItem('token');
            window.location.href = "/登录";
        }
    }

    // 切换内容区域函数
    function switchSection(sectionId, menuItem) {
        // 阻止默认跳转行为
        event.preventDefault();
        
        // 隐藏所有内容区域
        document.querySelectorAll('.content-section').forEach(section => {
            section.classList.remove('active');
        });
        
        // 显示选中的内容区域
        const selectedSection = document.getElementById(sectionId);
        if (selectedSection) {
            selectedSection.classList.add('active');
        }
        
        // 更新左侧导航栏样式
        document.querySelectorAll('.menu-item').forEach(item => {
            item.classList.remove('active');
            // 重置图标颜色
            const icon = item.querySelector('i');
            if (icon) {
                icon.classList.add('text-gray-400');
            }
        });
        
        // 设置当前选中项的样式
        menuItem.classList.add('active');
        const activeIcon = menuItem.querySelector('i');
        if (activeIcon) {
            activeIcon.classList.remove('text-gray-400');
        }
        
        // 根据选中的区域加载相应数据
        if (sectionId === 'consultation-history') {
            loadConsultationHistory();
        } else if (sectionId === 'my-doctors') {
            loadMyDoctors();
        } else if (sectionId === 'new-consultation') {
            loadRecentConsultations();
        }
    }

    function formatDateTime(dateString) {
        if (!dateString) return '';
        try {
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        } catch (e) {
            return '';
        }
    }

    // 筛选和排序医生
    function filterAndSortDoctors() {
        const filterValue = document.getElementById('doctorFilter').value;
        const sortValue = document.getElementById('doctorSort').value;
        
        let filteredDoctors = [...mockDoctors];
        
        // 筛选
        if (filterValue !== 'all') {
            filteredDoctors = filteredDoctors.filter(doctor => doctor.specialty === filterValue);
        }
        
        // 排序
        switch (sortValue) {
            case 'rating':
                filteredDoctors.sort((a, b) => b.rating - a.rating);
                break;
            case 'name':
                filteredDoctors.sort((a, b) => a.name.localeCompare(b.name));
                break;
            case 'count':
                filteredDoctors.sort((a, b) => b.ratingCount - a.ratingCount);
                break;
        }
        
        // 重新渲染医生列表
        const doctorsList = document.getElementById('doctorsList');
        doctorsList.innerHTML = '';
        
        if (filteredDoctors.length === 0) {
            doctorsList.innerHTML = '<div class="text-center py-4 text-gray-500">暂无符合条件的医生</div>';

                    </div>
                    ` : '<div class="text-sm text-gray-500 mt-2">等待医生回复中...</div>'}
                    <div class="flex justify-end mt-2">
                        <button class="text-primary hover:underline text-sm view-detail-btn" data-id="${consultation.id}">查看详情</button>
                    </div>
                `;

                recentContainer.appendChild(item);
            });
            
            // 添加查看详情按钮事件
            document.querySelectorAll('.view-detail-btn').forEach(button => {
                button.addEventListener('click', function() {
                    const consultationId = this.dataset.id;
                    showConsultationDetail(consultationId);
                });
            });
        } catch (error) {
            showError('加载最近咨询记录失败: ' + error.message);
        }
    }

    // 显示咨询详情
    function showConsultationDetail(consultationId) {
        // 查找咨询记录
        const consultation = mockConsultations.find(c => c.id == consultationId);
        if (!consultation) return;
        
        // 创建模态框
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
        modal.innerHTML = `
            <div class="bg-white rounded-lg p-6 max-w-2xl w-full mx-4">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-medium">咨询详情</h3>
                    <button class="close-modal text-gray-500 hover:text-gray-700">
                        <i class="ri-close-line text-xl"></i>
                    </button>
                </div>
                <div class="space-y-4">
                    <div>
                        <p class="text-sm text-gray-500">咨询时间</p>
                        <p class="font-medium">${formatDateTime(consultation.created_at)}</p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">咨询医生</p>
                        <p class="font-medium">${consultation.doctor_name}</p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">咨询状态</p>
                        <p class="font-medium">${consultation.status === 'completed' ? '已完成' : '待回复'}</p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">咨询问题</p>
                        <p class="font-medium">${consultation.question}</p>
                    </div>
                    ${consultation.answer ? `
                    <div>
                        <p class="text-sm text-gray-500">医生回复</p>
                        <p class="font-medium">${consultation.answer}</p>
                    </div>
                    ` : '<div class="text-sm text-gray-500">等待医生回复中...</div>'}
                </div>
                <div class="mt-6 flex justify-end">
                    <button class="close-modal px-6 py-2 bg-gray-200 text-gray-700 rounded-button hover:bg-gray-300 transition-colors">
                        关闭
                    </button>
                </div>
            </div>
        `;
        
        document.body.appendChild(modal);
        
        // 关闭模态框
        modal.querySelectorAll('.close-modal').forEach(button => {
            button.addEventListener('click', function() {
                modal.remove();
            });
        });
        
        // 点击模态框外部关闭
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                modal.remove();
            }
        });
    }
</script>
</body>
</html>

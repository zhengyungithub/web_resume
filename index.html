<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16a34a" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>web-resume</title>
    <style>
      :root { --sk-bg: #f0fdf4; --sk-card: #ffffff; --sk-line: #e5e7eb; --sk-shimmer: rgba(255,255,255,.65); }
      body { margin: 0; background: var(--sk-bg); }
      .sk-container { max-width: 1100px; margin: 0 auto; padding: 24px; }
      .sk-card { background: var(--sk-card); border: 1px solid #e5e7eb; border-radius: 18px; padding: 18px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
      .sk-row { display:flex; gap: 16px; align-items:center; }
      .sk-avatar { width: 72px; height: 72px; border-radius: 18px; background: var(--sk-line); position: relative; overflow: hidden; }
      .sk-line { height: 12px; border-radius: 999px; background: var(--sk-line); position: relative; overflow: hidden; }
      .sk-line.lg { height: 18px; }
      .sk-grid { display:grid; grid-template-columns: 1fr; gap: 14px; margin-top: 16px; }
      @media (min-width: 768px) { .sk-grid { grid-template-columns: 1.4fr .9fr; } }
      .sk-shimmer::after {
        content:"";
        position:absolute; inset:0;
        transform: translateX(-100%);
        background: linear-gradient(90deg, rgba(255,255,255,0) 0%, var(--sk-shimmer) 50%, rgba(255,255,255,0) 100%);
        animation: sk 1.2s infinite;
      }
      @keyframes sk { 100% { transform: translateX(100%); } }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="sk-container" aria-hidden="true">
        <div class="sk-card">
          <div class="sk-row">
            <div class="sk-avatar sk-shimmer"></div>
            <div style="flex:1">
              <div class="sk-line lg sk-shimmer" style="width: 62%"></div>
              <div style="height:10px"></div>
              <div class="sk-line sk-shimmer" style="width: 88%"></div>
              <div style="height:8px"></div>
              <div class="sk-line sk-shimmer" style="width: 72%"></div>
            </div>
          </div>
        </div>
        <div class="sk-grid">
          <div class="sk-card">
            <div class="sk-line lg sk-shimmer" style="width: 40%"></div>
            <div style="height:14px"></div>
            <div class="sk-line sk-shimmer" style="width: 96%"></div>
            <div style="height:10px"></div>
            <div class="sk-line sk-shimmer" style="width: 84%"></div>
          </div>
          <div class="sk-card">
            <div class="sk-line lg sk-shimmer" style="width: 55%"></div>
            <div style="height:14px"></div>
            <div class="sk-line sk-shimmer" style="width: 90%"></div>
            <div style="height:10px"></div>
            <div class="sk-line sk-shimmer" style="width: 70%"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
